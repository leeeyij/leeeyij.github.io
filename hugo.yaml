baseURL: 'https://leeeyij.github.io/'
languageCode: zh-cn
title: 三藏的博客
theme: PaperMod

params:
  env: production
  description: '记录技术、生活与思考'
  author: 三藏
  defaultTheme: auto
  disableThemeToggle: false
  
  # 文章页面设置
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false
  
  # 首页信息
  homeInfoParams:
    Title: '你好，我是三藏 👋'
    Content: '这里记录我的技术探索、学习笔记和日常思考。欢迎交流！'
  
  # 社交链接
  socialIcons:
    - name: github
      url: 'https://github.com/leeeyij'
    - name: rss
      url: 'index.xml'
  
  # 编辑文章链接
  editPost:
    URL: 'https://github.com/leeeyij/leeeyij.github.io/tree/main/content'
    Text: '编辑'
    appendFilePath: true
  
  # 搜索
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: home
      name: 首页
      url: /
      weight: 10
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 20
    - identifier: categories
      name: 分类
      url: /categories/
      weight: 30
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 40
    - identifier: search
      name: 搜索
      url: /search/
      weight: 50

outputs:
  home:
    - HTML
    - RSS
    - JSON

permalinks:
  posts: /:year/:month/:title/
